apiVersion: cilium.io/v2alpha1
kind: CiliumResourceNetworkConfig
metadata:
  name: service-2a-network-config
spec:
  - nodeSelector:
      matchLabels:
        sriov: "true"
    ipPool: service-2a-ip-pool
    ipv4:
      netMask: 24
      staticRoutes:
        - destination: 232.2.1.0/24
          gateway: 10.10.3.1
---
apiVersion: cilium.io/v2alpha1
kind: CiliumResourceNetworkConfig
metadata:
  name: service-2b-network-config
spec:
  - nodeSelector:
      matchLabels:
        sriov: "true"
    ipPool: service-2b-ip-pool
    ipv4:
      netMask: 24
      staticRoutes:
        - destination: 232.2.1.0/24
          gateway: 10.10.4.1