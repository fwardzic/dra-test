---
apiVersion: v1
kind: Pod
metadata:
  name: netshoot-sriov-1
  namespace: default
spec:
  containers:
  - name: netshoot
    image: nicolaka/netshoot
    command: ["/bin/bash"]
    args: ["-c", "while true; do ping localhost; sleep 60;done"]
  resourceClaims:
  - name: demo-claim
    resourceClaimTemplateName: sriov-demo-service