---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: sriov-service-2
  namespace: default
spec:
  spec:
    devices:
      config:
        - requests:
            - leaf-101
          opaque:
            driver: sriov.cilium.k8s.io
            parameters:
              vlan: 3043
              ipv4Addr: 10.10.3.10/24
              ipv6Addr: fd00:3043::10/80
        - requests:
            - leaf-102
          opaque:
            driver: sriov.cilium.k8s.io
            parameters:
              vlan: 3044
              ipv4Addr: 10.10.4.10/24
              ipv6Addr: fd00:3044::10/80
      requests:
      - name: leaf-101
        exactly:
          deviceClassName: leaf-101.sriov.cilium.k8s.io
      - name: leaf-102
        exactly:
          deviceClassName: leaf-102.sriov.cilium.k8s.io